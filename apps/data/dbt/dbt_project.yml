name: petrocast_data
version: "0.1.0"
config-version: 2

profile: petrocast

model-paths:
  - models
macro-paths:
  - macros

target-path: target
clean-targets:
  - target
  - dbt_packages

models:
  petrocast_data:
    +materialized: view
    silver:
      +schema: silver
    gold:
      +schema: gold
    # Feature store (ADR-0031): ML contract layer, separate from gold. One row
    # per (well_id, as_of_date); training and inference read the same tables.
    features:
      +schema: features

# Data quality (ADR-0025): persist failing rows so a check leaves evidence, not
# just a runtime pass/fail. Failures land in the `<schema>_dbt_test__audit`
# schema for the Data Owner / Data Engineer to inspect (F2-17).
data_tests:
  petrocast_data:
    +store_failures: true
