# Traefik stack for staging and prod — ACME HTTP-01 challenge (per-host cert)
# Deployed once per EC2 by bootstrap-swarm.sh.
# ${ACME_EMAIL} and ${AWS_REGION} are substituted by envsubst at deploy time.

services:
  traefik:
    image: traefik:v3.6.13
    command:
      - --api.dashboard=false
      - --log.level=INFO
      - --providers.swarm=true
      - --providers.swarm.endpoint=unix:///var/run/docker.sock
      - --providers.swarm.exposedByDefault=false
      - --providers.swarm.network=traefik-public
      # Docker provider: discover standalone `docker compose` containers (the
      # Phase-2 data stack) by their Traefik labels — they attach to traefik-public.
      - --providers.docker=true
      - --providers.docker.exposedByDefault=false
      # File provider: dynamic config (the petrocast-auth basic-auth middleware)
      # written by the bootstrap from SSM secrets into /etc/traefik/dynamic.
      - --providers.file.directory=/etc/traefik/dynamic
      - --providers.file.watch=true
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443
      - --entrypoints.web.http.redirections.entryPoint.to=websecure
      - --entrypoints.web.http.redirections.entryPoint.scheme=https
      - --certificatesresolvers.le.acme.email=${ACME_EMAIL}
      - --certificatesresolvers.le.acme.storage=/acme/acme.json
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web
    ports:
      - target: 80
        published: 80
        mode: host
      - target: 443
        published: 443
        mode: host
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - acme:/acme
      # Dynamic config (basic-auth middleware). Empty on prod (no data stack);
      # populated by the bootstrap on staging.
      - /opt/petrocast/traefik-dynamic:/etc/traefik/dynamic:ro
    networks:
      - traefik-public
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      update_config:
        order: start-first
      labels:
        - "traefik.enable=false"

networks:
  traefik-public:
    external: true

volumes:
  acme:
    driver: local
