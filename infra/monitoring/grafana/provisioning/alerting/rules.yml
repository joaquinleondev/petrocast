apiVersion: 1

groups:
  - orgId: 1
    name: petrocast-api
    folder: Petrocast
    interval: 1m
    rules:
      - uid: petrocast-api-high-cpu
        title: API CPU usage above 80%
        condition: C
        for: 5m
        noDataState: NoData
        execErrState: Error
        annotations:
          summary: El proceso del API consume más del 80% de un core hace 5 minutos.
          description: |
            La métrica process_cpu_seconds_total del job petrocast-api viene
            creciendo a un ritmo > 0.8 segundos por segundo durante 5 minutos
            seguidos, lo que indica saturación de CPU sostenida.
        labels:
          severity: warning
          component: api
        data:
          - refId: A
            datasourceUid: prometheus
            relativeTimeRange:
              from: 300
              to: 0
            model:
              refId: A
              datasource:
                type: prometheus
                uid: prometheus
              expr: rate(process_cpu_seconds_total{job="petrocast-api"}[1m]) * 100
              instant: false
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: B
              type: reduce
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              reducer: last
          - refId: C
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              refId: C
              type: threshold
              datasource:
                type: __expr__
                uid: __expr__
              expression: B
              conditions:
                - evaluator:
                    type: gt
                    params: [80]
                  operator:
                    type: and
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
