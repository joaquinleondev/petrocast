# MLflow tracking + model registry UI (ADR-0032, backlog F3-08).
#
# Topology (ADR-0032): the *backend store* is a shared cloud Postgres
# (Neon/Supabase free tier, or RDS) and the *artifact store* is S3, so the
# whole team sees the same runs/models while the UI runs locally on each dev
# machine — no 24/7 server to host. Ready-to-deploy in staging (see
# compose.staging.yml) but not deployed, per the compute budget.
#
# Team mode (default, needs cloud credentials in the environment):
#   export PETROCAST_MLFLOW_BACKEND_URI='postgresql://...neon.../mlflow?sslmode=require'
#   export PETROCAST_MLFLOW_ARTIFACT_ROOT='s3://<artifacts-bucket>/mlflow'
#   docker compose -f infra/compose.mlflow.yml up -d --build
#
# Local fallback (fully offline, no cloud): uses the `mlflow` database of the
# data-stack Postgres (created by init 003) and a named volume for artifacts:
#   docker compose -f infra/compose.data.yml -f infra/compose.mlflow.yml \
#     --env-file apps/data/.env up -d --build data-postgres mlflow
#
# UI: http://localhost:5000 (override host port with PETROCAST_MLFLOW_PORT).
# Full runbook: docs/runbooks/mlflow-tracking.md

services:
  mlflow:
    build: ./mlflow
    image: petrocast-mlflow:dev
    environment:
      PETROCAST_MLFLOW_BACKEND_URI: ${PETROCAST_MLFLOW_BACKEND_URI:-}
      PETROCAST_MLFLOW_ARTIFACT_ROOT: ${PETROCAST_MLFLOW_ARTIFACT_ROOT:-/mlartifacts}
      PETROCAST_DW_USER: ${PETROCAST_DW_USER:-}
      PETROCAST_DW_PASSWORD: ${PETROCAST_DW_PASSWORD:-}
      PETROCAST_DW_PORT: ${PETROCAST_DW_PORT:-5432}
      # Host headers que el server acepta (MLflow los valida contra DNS
      # rebinding y responde 400 a cualquier otro). Ampliar si se llega a la UI
      # por un nombre distinto de localhost — p. ej. un reverse proxy o un
      # `tailscale serve`, donde el Host es el DNS de la tailnet.
      PETROCAST_MLFLOW_ALLOWED_HOSTS: ${PETROCAST_MLFLOW_ALLOWED_HOSTS:-localhost,127.0.0.1,mlflow}
      # S3 credentials for the artifact store (unused in local fallback).
      # AWS_SESSION_TOKEN is required for temporary/SSO credentials, which is how
      # the team reaches the bucket (the org SCP forbids static IAM users).
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_SESSION_TOKEN: ${AWS_SESSION_TOKEN:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-2}
    ports:
      - "${PETROCAST_MLFLOW_PORT:-5000}:5000"
    volumes:
      # Artifact storage for the local fallback; ignored when the artifact
      # root points at S3.
      - mlflow_artifacts:/mlartifacts
    command:
      - /bin/sh
      - -ec
      - |
        backend_uri="$${PETROCAST_MLFLOW_BACKEND_URI}"
        if [ -z "$${backend_uri}" ]; then
          : "$${PETROCAST_DW_USER:?Set PETROCAST_DW_USER in apps/data/.env}"
          : "$${PETROCAST_DW_PASSWORD:?Set PETROCAST_DW_PASSWORD in apps/data/.env}"
          backend_uri="postgresql://$${PETROCAST_DW_USER}:$${PETROCAST_DW_PASSWORD}@data-postgres:$${PETROCAST_DW_PORT}/mlflow"
        fi
        exec mlflow server \
          --host=0.0.0.0 \
          --port=5000 \
          --backend-store-uri="$${backend_uri}" \
          --serve-artifacts \
          --artifacts-destination="$${PETROCAST_MLFLOW_ARTIFACT_ROOT}" \
          --allowed-hosts="$${PETROCAST_MLFLOW_ALLOWED_HOSTS}"
    networks:
      - petrocast_data
    restart: unless-stopped

volumes:
  mlflow_artifacts:

networks:
  # Same key as in compose.data.yml: when both files run as one project the
  # service joins the data network (local fallback reaches data-postgres);
  # standalone, compose just creates an isolated network with this name.
  petrocast_data:
