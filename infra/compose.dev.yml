services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
      target: runtime
    image: petrocast-api:dev
    ports:
      - "8000:8000"
    env_file:
      - ../apps/api/.env.example
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/live')",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
