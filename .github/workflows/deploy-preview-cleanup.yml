name: deploy-preview-cleanup

on:
  pull_request:
    branches: [main]
    types: [closed]

jobs:
  cleanup:
    name: teardown PR preview
    runs-on: ubuntu-latest
    environment: preview
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Remove Swarm stack via SSM
        id: ssm
        env:
          PR_NUM: ${{ github.event.number }}
          INSTANCE_ID: ${{ secrets.PREVIEW_INSTANCE_ID }}
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n \
              --arg cmd "docker stack rm pr-${PR_NUM} || true" \
              '{commands: [$cmd]}')" \
            --cloud-watch-output-config \
              "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=/petrocast/preview/deploy" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        env:
          INSTANCE_ID: ${{ secrets.PREVIEW_INSTANCE_ID }}
        run: |
          for i in $(seq 1 18); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "Stack removed"; exit 0 ;;
              Failed|Cancelled|TimedOut|DeliveryTimedOut|ExecutionTimedOut)
                echo "SSM command failed: $STATUS" >&2; exit 1 ;;
              *) echo "Waiting... ($i/18)" ;;
            esac
            sleep 5
          done
          echo "Timed out" >&2; exit 1

      - name: Purge PR ECR tags
        env:
          PR_NUM: ${{ github.event.number }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          # List and delete all image tags matching pr-<N>-*
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name "petrocast/mock-api" \
            --region "$AWS_REGION" \
            --filter "tagStatus=TAGGED" \
            --query "imageIds[?starts_with(imageTag, 'pr-${PR_NUM}-')]" \
            --output json)

          if [[ "$IMAGE_IDS" != "[]" ]]; then
            aws ecr batch-delete-image \
              --repository-name "petrocast/mock-api" \
              --region "$AWS_REGION" \
              --image-ids "$IMAGE_IDS"
            echo "Deleted ECR tags for PR ${PR_NUM}"
          else
            echo "No ECR tags found for PR ${PR_NUM}"
          fi

      - name: Comment on PR
        if: always()
        uses: actions/github-script@v9
        env:
          PR_NUM: ${{ github.event.number }}
        with:
          script: |
            const result = context.job.status === 'success' ? 'torn down' : 'teardown failed (manual cleanup may be needed)';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Preview ${result}\n\nStack \`pr-${process.env.PR_NUM}\` ${result}.`
            })
