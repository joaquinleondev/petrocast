name: deploy-staging

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: deploy to staging
    runs-on: ubuntu-latest
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify image exists in ECR
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          aws ecr describe-images \
            --repository-name "petrocast/mock-api" \
            --region "$AWS_REGION" \
            --image-ids "imageTag=sha-${SHORT_SHA}" \
            --query "imageDetails[0].imageTags" \
            --output text
          echo "Image sha-${SHORT_SHA} confirmed in ECR"

      - name: Deploy via SSM
        id: ssm
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          API_KEY: ${{ secrets.API_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          cat > /tmp/deploy-cmd.sh << EOF
          export IMAGE_URI="${ECR_REGISTRY}/petrocast/mock-api:sha-${SHORT_SHA}"
          export STACK_NAME="staging"
          export HOSTNAME="staging.${DOMAIN}"
          export REPLICAS="2"
          export ENV="staging"
          export API_KEY="${API_KEY}"
          export AWS_REGION="${AWS_REGION}"
          export ECR_REGISTRY="${ECR_REGISTRY}"
          EOF
          cat infra/scripts/deploy.sh >> /tmp/deploy-cmd.sh

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n --rawfile cmd /tmp/deploy-cmd.sh '{commands: [$cmd]}')" \
            --cloud-watch-output-config \
              "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=/petrocast/staging/deploy" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        env:
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
        run: |
          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "SSM command succeeded"; exit 0 ;;
              Failed|Cancelled|TimedOut|DeliveryTimedOut|ExecutionTimedOut)
                echo "SSM command failed: $STATUS" >&2
                aws ssm get-command-invocation \
                  --command-id "${{ steps.ssm.outputs.command_id }}" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" --output text >&2 || true
                exit 1 ;;
              *) echo "Waiting... status=$STATUS ($i/36)" ;;
            esac
            sleep 5
          done
          echo "Timed out" >&2; exit 1

      - name: Smoke test
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          STAGING_URL="https://staging.${DOMAIN}"
          for attempt in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              --max-time 10 "${STAGING_URL}/health/ready" || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Smoke test passed — ${STAGING_URL}"; exit 0
            fi
            echo "Not ready yet — HTTP $HTTP_CODE (attempt $attempt/12)"
            sleep 10
          done
          echo "Smoke test failed after 12 attempts" >&2; exit 1

      - name: Rollback on smoke failure
        if: failure()
        env:
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          cat > /tmp/rollback-cmd.sh << EOF
          export STACK_NAME="staging"
          export AWS_REGION="${AWS_REGION}"
          EOF
          cat infra/scripts/rollback.sh >> /tmp/rollback-cmd.sh

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n --rawfile cmd /tmp/rollback-cmd.sh '{commands: [$cmd]}')" \
            --cloud-watch-output-config \
              "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=/petrocast/staging/deploy" \
            --query "Command.CommandId" \
            --output text)

          for i in $(seq 1 18); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "Rollback complete"; break ;;
              Failed|Cancelled|TimedOut|*TimedOut) echo "Rollback failed: $STATUS" >&2; break ;;
              *) echo "Rollback in progress... ($i/18)" ;;
            esac
            sleep 5
          done
          exit 1
