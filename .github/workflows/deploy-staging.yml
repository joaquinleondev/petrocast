name: deploy-staging

# Se dispara cuando el workflow `ci` termina en `main`. Antes corría en
# `push: main` en paralelo con `ci` y verificaba en ECR la imagen `sha-<commit>`
# que `ci` todavía estaba construyendo: una carrera. Cuando la API sumó
# dependencias pesadas de ML (mlflow/lightgbm/scikit-learn), el build de `ci`
# pasó a tardar más que la ventana de espera (24×10s) y el deploy empezó a
# fallar en cada push. Con `workflow_run` esperamos a que `ci` publique la
# imagen antes de desplegar.
on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: deploy to staging
    runs-on: ubuntu-latest
    # Sólo desplegar si `ci` (incluido build & scan) terminó OK; si falló, la
    # imagen no existe y no hay nada que desplegar.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    environment: staging
    permissions:
      id-token: write
      contents: read
    steps:
      # `workflow_run` corre en el contexto de la rama por defecto; fijamos el
      # checkout al commit que disparó `ci`, no al HEAD de main.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Compute short SHA
        id: sha
        env:
          # Bajo `workflow_run`, `github.sha` apunta al tip de main, no al
          # commit desplegado; usamos el head_sha del run de `ci`.
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: echo "short=${HEAD_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Verify image exists in ECR
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          FOUND=0
          for attempt in $(seq 1 24); do
            if aws ecr describe-images \
              --repository-name "petrocast/mock-api" \
              --region "$AWS_REGION" \
              --image-ids "imageTag=sha-${SHORT_SHA}" \
              --query "imageDetails[0].imageTags" \
              --output text; then
              FOUND=1
              break
            fi
            echo "Waiting for image sha-${SHORT_SHA} in ECR (attempt $attempt/24)"
            sleep 10
          done
          if [[ "$FOUND" != "1" ]]; then
            echo "Image sha-${SHORT_SHA} was not found in ECR" >&2
            exit 1
          fi
          echo "Image sha-${SHORT_SHA} confirmed in ECR"

      - name: Deploy via SSM
        id: ssm
        env:
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          API_KEY: ${{ secrets.API_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          cat > /tmp/deploy-cmd.sh << EOF
          export IMAGE_URI="${ECR_REGISTRY}/petrocast/mock-api:sha-${SHORT_SHA}"
          export STACK_NAME="staging"
          export HOSTNAME="staging.${DOMAIN}"
          export REPLICAS="2"
          export ENV="staging"
          export API_KEY="${API_KEY}"
          export AWS_REGION="${AWS_REGION}"
          export ECR_REGISTRY="${ECR_REGISTRY}"
          EOF
          {
            echo "cat > /tmp/mock-api.stack.yml << 'STACK_EOF'"
            cat infra/swarm/mock-api.stack.yml
            echo "STACK_EOF"
          } >> /tmp/deploy-cmd.sh
          cat infra/scripts/deploy.sh >> /tmp/deploy-cmd.sh

          S=$(base64 -w0 /tmp/deploy-cmd.sh); L=${#S}; Q=$(( (L + 3) / 4 ))
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n \
              --arg c1 "printf '%s' '${S:0:$Q}' > /tmp/run.b64" \
              --arg c2 "printf '%s' '${S:$Q:$Q}' >> /tmp/run.b64" \
              --arg c3 "printf '%s' '${S:$((2*Q)):$Q}' >> /tmp/run.b64" \
              --arg c4 "printf '%s' '${S:$((3*Q))}' >> /tmp/run.b64 && base64 -d /tmp/run.b64 > /tmp/deploy-run.sh && bash /tmp/deploy-run.sh" \
              '{commands: [$c1,$c2,$c3,$c4]}')" \
            --cloud-watch-output-config \
              "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=/petrocast/staging/deploy" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        env:
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
        run: |
          for i in $(seq 1 36); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "${{ steps.ssm.outputs.command_id }}" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "SSM command succeeded"; exit 0 ;;
              Failed|Cancelled|TimedOut|DeliveryTimedOut|ExecutionTimedOut)
                echo "SSM command failed: $STATUS" >&2
                aws ssm get-command-invocation \
                  --command-id "${{ steps.ssm.outputs.command_id }}" \
                  --instance-id "$INSTANCE_ID" \
                  --query "StandardErrorContent" --output text >&2 || true
                exit 1 ;;
              *) echo "Waiting... status=$STATUS ($i/36)" ;;
            esac
            sleep 5
          done
          echo "Timed out" >&2; exit 1

      - name: Smoke test
        env:
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          STAGING_URL="https://staging.${DOMAIN}"
          for attempt in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' \
              --max-time 10 "${STAGING_URL}/health/ready" || echo "000")
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Smoke test passed — ${STAGING_URL}"; exit 0
            fi
            echo "Not ready yet — HTTP $HTTP_CODE (attempt $attempt/12)"
            sleep 10
          done
          echo "Smoke test failed after 12 attempts" >&2; exit 1

      - name: Rollback on smoke failure
        # Sólo revertir si realmente se despachó un deploy en este run. Sin esta
        # guarda, un fallo en "Verify image"/"Deploy" dispara un
        # `docker service rollback` sobre un servicio que no cambió, revirtiendo
        # el último deploy bueno.
        if: failure() && steps.ssm.outcome == 'success'
        env:
          INSTANCE_ID: ${{ secrets.STAGING_INSTANCE_ID }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          cat > /tmp/rollback-cmd.sh << EOF
          export STACK_NAME="staging"
          export AWS_REGION="${AWS_REGION}"
          EOF
          cat infra/scripts/rollback.sh >> /tmp/rollback-cmd.sh

          RS=$(base64 -w0 /tmp/rollback-cmd.sh); RH=$((${#RS}/2))
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n \
              --arg c1 "printf '%s' '${RS:0:$RH}' > /tmp/rb.b64" \
              --arg c2 "printf '%s' '${RS:$RH}' >> /tmp/rb.b64 && base64 -d /tmp/rb.b64 > /tmp/rollback-run.sh && bash /tmp/rollback-run.sh" \
              '{commands: [$c1,$c2]}')" \
            --cloud-watch-output-config \
              "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=/petrocast/staging/deploy" \
            --query "Command.CommandId" \
            --output text)

          for i in $(seq 1 18); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "Rollback complete"; break ;;
              Failed|Cancelled|TimedOut|*TimedOut) echo "Rollback failed: $STATUS" >&2; break ;;
              *) echo "Rollback in progress... ($i/18)" ;;
            esac
            sleep 5
          done
          exit 1
