name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Run pre-commit
        run: pre-commit run --all-files --show-diff-on-failure

  test:
    name: test (unit + integration + contract)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
      - name: Install deps
        run: uv sync --frozen
      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report=xml:coverage.xml
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: apps/api/coverage.xml

  data-pipeline:
    name: data pipeline checks
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: petrocast
          POSTGRES_USER: petrocast
          POSTGRES_PASSWORD: petrocast
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U petrocast -d petrocast"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: apps/data
    env:
      PETROCAST_DW_HOST: localhost
      PETROCAST_DW_PORT: "5432"
      PETROCAST_DW_USER: petrocast
      PETROCAST_DW_PASSWORD: petrocast
      PETROCAST_DW_DATABASE: petrocast
      PETROCAST_SOURCE_PRODUCTION_URL: tests/fixtures/production_by_well.csv
      PETROCAST_SOURCE_WELLS_URL: tests/fixtures/wells_registry.csv
      DBT_PROFILES_DIR: ${{ github.workspace }}/apps/data/dbt
      PYTHONPATH: ${{ github.workspace }}/apps/data/src
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/data/uv.lock
      - name: Wait for Postgres
        run: |
          for attempt in {1..30}; do
            if docker exec "${{ job.services.postgres.id }}" pg_isready \
              -h localhost \
              -p "$PETROCAST_DW_PORT" \
              -U "$PETROCAST_DW_USER" \
              -d "$PETROCAST_DW_DATABASE"; then
              exit 0
            fi
            echo "Waiting for Postgres ($attempt/30)"
            sleep 2
          done
          docker logs "${{ job.services.postgres.id }}"
          exit 1
      - name: Install deps
        run: uv sync --frozen
      - name: Ensure medallion schemas
        run: |
          uv run python - <<'PY'
          import os

          import psycopg
          from psycopg import sql

          with psycopg.connect(
              host=os.environ["PETROCAST_DW_HOST"],
              port=os.environ["PETROCAST_DW_PORT"],
              dbname=os.environ["PETROCAST_DW_DATABASE"],
              user=os.environ["PETROCAST_DW_USER"],
              password=os.environ["PETROCAST_DW_PASSWORD"],
              autocommit=True,
          ) as connection:
              with connection.cursor() as cursor:
                  for schema_name in ("bronze", "silver", "gold", "features"):
                      cursor.execute(
                          sql.SQL("create schema if not exists {}").format(
                              sql.Identifier(schema_name)
                          )
                      )
          PY
      - name: Install dbt packages
        run: uv run dbt deps --project-dir dbt
      - name: Parse dbt project
        run: uv run dbt parse --project-dir dbt --profiles-dir dbt
      # Run the data app's Python tests (sensor + webhook resource + the blocking
      # asset-check contract for F2-18). Placed after `dbt parse` so the manifest
      # exists for the asset-check introspection test, and before the materialize
      # steps so a regression fails fast.
      - name: Run data app tests
        run: uv run pytest -q
      # Materialize the ingestion (EL) layer in two sequential steps. The two dlt
      # pipelines (smoke and bronze) write to the same `bronze` schema, so running
      # them concurrently (the default multiprocess executor with `--select "*"`)
      # deadlocks on dlt's shared internal tables. Separate `materialize` runs are
      # distinct processes, so the pipelines run one after another. The medallion
      # transforms (silver/gold) are built and tested by the dbt steps below, after
      # bronze is loaded (F2-19 connects bronze→silver→gold in the Dagster asset
      # graph; the two sequential `materialize` calls remain to avoid the dlt deadlock).
      - name: Materialize warehouse + smoke ingestion (Dagster/dlt)
        run: uv run dagster asset materialize --module-name petrocast_data.definitions --select "warehouse_schemas_ready,bronze/smoke_events"
      - name: Materialize bronze ingestion (Dagster/dlt)
        run: uv run dagster asset materialize --module-name petrocast_data.definitions --select "bronze/production_by_well,bronze/wells_registry" --partition 2026-05-01
      - name: Build dbt scaffold
        run: uv run dbt build --project-dir dbt --profiles-dir dbt --select tag:f2_10_scaffold
      - name: Build dbt silver
        run: uv run dbt build --project-dir dbt --profiles-dir dbt --select tag:silver
      # cautious: the features PIT singular test refs fact_production AND
      # well_features; eager indirect selection would run it here, before the
      # features table exists. It runs in the features step below instead.
      - name: Build dbt gold
        run: uv run dbt build --project-dir dbt --profiles-dir dbt --select tag:gold --indirect-selection cautious
      - name: Build dbt features (feature store)
        run: uv run dbt build --project-dir dbt --profiles-dir dbt --select tag:features
      # F3-11: give the point-in-time / anti-leakage test real power. The default
      # cutoff (max(production_month)+1 month) has no production on/after it, so a
      # dropped `where production_month < as_of_date` would be invisible there.
      # Re-materialize well_features at a HISTORICAL cutoff (2015-06-01) where the
      # fixture has 12+ months of strict prior history AND production on/after the
      # cutoff, then run the PIT test over it: a leak of on/after-cutoff months now
      # makes the persisted features diverge from the strict recomputation and the
      # test fails. delete+insert leaves the default-cutoff snapshot from the step
      # above intact, so both cutoffs stay covered. The test is named explicitly so
      # it runs regardless of indirect-selection defaults.
      - name: Build + PIT-test dbt features at a historical cutoff
        run: |
          uv run dbt build --project-dir dbt --profiles-dir dbt \
            --select well_features assert_well_features_point_in_time \
            --vars '{as_of_date: "2015-06-01"}'
      - name: Generate dbt docs (lineage artifacts)
        run: uv run dbt docs generate --project-dir dbt --profiles-dir dbt
      - name: Upload dbt lineage artifacts (for DataHub / F2-21)
        uses: actions/upload-artifact@v7
        with:
          name: dbt-lineage-artifacts
          path: |
            apps/data/dbt/target/manifest.json
            apps/data/dbt/target/catalog.json
          if-no-files-found: error

  ml:
    name: ml checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/ml
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: apps/ml/uv.lock
      - name: Install deps
        run: uv sync --frozen
      # Offline by design (F3-10): the ML tests run on committed fixtures only —
      # no Postgres, no MLflow server, no internet.
      - name: Run ml tests
        run: uv run pytest -q
      - name: Ruff
        run: uv run ruff check .
      - name: Mypy
        run: uv run mypy

  build:
    name: build & scan
    needs: [lint, test, data-pipeline, ml]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPOSITORY: petrocast/mock-api
    outputs:
      image_uri: ${{ steps.image.outputs.uri }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: echo "short=${SOURCE_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: image
        run: |
          echo "uri=${ECR_REGISTRY}/${ECR_REPOSITORY}:sha-${{ steps.sha.outputs.short }}" >> "$GITHUB_OUTPUT"
          echo "local=petrocast-mock-api:sha-${{ steps.sha.outputs.short }}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (local)
        uses: docker/build-push-action@v7
        with:
          context: apps
          file: apps/api/Dockerfile
          push: false
          load: true
          pull: true
          build-args: |
            APT_CACHE_BUSTER=${{ github.run_id }}
          tags: |
            ${{ steps.image.outputs.local }}
            ${{ steps.image.outputs.uri }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push PR alias tag (preview, pre-scan)
        if: github.event_name == 'pull_request'
        run: |
          PR_TAG="${ECR_REGISTRY}/${ECR_REPOSITORY}:pr-${{ github.event.number }}-sha-${{ steps.sha.outputs.short }}"
          docker tag "${{ steps.image.outputs.uri }}" "$PR_TAG"
          docker push "$PR_TAG"

      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ${{ steps.image.outputs.local }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"
          ignore-unfixed: true
          limit-severities-for-sarif: true

      - name: Push canonical tag (sha-<short>)
        run: docker push "${{ steps.image.outputs.uri }}"

      - name: Push staging-latest tag
        if: github.ref == 'refs/heads/main'
        run: |
          STAGING_TAG="${ECR_REGISTRY}/${ECR_REPOSITORY}:staging-latest"
          docker tag "${{ steps.image.outputs.uri }}" "$STAGING_TAG"
          docker push "$STAGING_TAG"

      - name: Upload Trivy SARIF
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: trivy-sarif
          path: trivy-results.sarif

  deploy-preview:
    name: deploy PR preview
    needs: build
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    environment: preview
    concurrency:
      group: preview-pr-${{ github.event.number }}
      cancel-in-progress: true
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: echo "short=${SOURCE_SHA::7}" >> "$GITHUB_OUTPUT"

      # Guard against the merge race: if the PR was merged/closed while this run
      # was still in flight, skip the deploy so we don't re-create a stack that
      # deploy-preview-cleanup has just torn down (orphan preview burning compute).
      - name: Check PR still open
        id: guard
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUM: ${{ github.event.number }}
        run: |
          STATE=$(gh pr view "$PR_NUM" --repo "$GITHUB_REPOSITORY" --json state -q .state)
          echo "PR #$PR_NUM state: $STATE"
          if [[ "$STATE" == "OPEN" ]]; then
            echo "open=true" >> "$GITHUB_OUTPUT"
          else
            echo "open=false" >> "$GITHUB_OUTPUT"
            echo "::notice::PR #$PR_NUM is $STATE — skipping preview deploy to avoid orphaning a stack."
          fi

      - name: Configure AWS credentials
        if: steps.guard.outputs.open == 'true'
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy via SSM
        id: ssm
        if: steps.guard.outputs.open == 'true'
        env:
          PR_NUM: ${{ github.event.number }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          INSTANCE_ID: ${{ secrets.PREVIEW_INSTANCE_ID }}
          ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
          DOMAIN: ${{ secrets.DOMAIN }}
          API_KEY: ${{ secrets.API_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
        run: |
          cat > /tmp/deploy-cmd.sh << EOF
          export IMAGE_URI="${ECR_REGISTRY}/petrocast/mock-api:pr-${PR_NUM}-sha-${SHORT_SHA}"
          export STACK_NAME="pr-${PR_NUM}"
          export HOSTNAME="pr-${PR_NUM}.dev.${DOMAIN}"
          export REPLICAS="1"
          export ENV="preview"
          export API_KEY="${API_KEY}"
          export AWS_REGION="${AWS_REGION}"
          export ECR_REGISTRY="${ECR_REGISTRY}"
          EOF
          {
            echo "cat > /tmp/mock-api.stack.yml << 'STACK_EOF'"
            cat infra/swarm/mock-api.stack.yml
            echo "STACK_EOF"
          } >> /tmp/deploy-cmd.sh
          cat infra/scripts/deploy.sh >> /tmp/deploy-cmd.sh

          S=$(base64 -w0 /tmp/deploy-cmd.sh); L=${#S}; Q=$(( (L + 3) / 4 ))
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "$(jq -n \
              --arg c1 "printf '%s' '${S:0:$Q}' > /tmp/run.b64" \
              --arg c2 "printf '%s' '${S:$Q:$Q}' >> /tmp/run.b64" \
              --arg c3 "printf '%s' '${S:$((2*Q)):$Q}' >> /tmp/run.b64" \
              --arg c4 "printf '%s' '${S:$((3*Q))}' >> /tmp/run.b64 && base64 -d /tmp/run.b64 > /tmp/deploy-run.sh && bash /tmp/deploy-run.sh" \
              '{commands: [$c1,$c2,$c3,$c4]}')" \
            --cloud-watch-output-config \
              "CloudWatchOutputEnabled=true,CloudWatchLogGroupName=/petrocast/preview/deploy" \
            --query "Command.CommandId" \
            --output text)
          echo "command_id=${COMMAND_ID}" >> "$GITHUB_OUTPUT"

      - name: Wait for SSM command
        if: steps.guard.outputs.open == 'true'
        env:
          INSTANCE_ID: ${{ secrets.PREVIEW_INSTANCE_ID }}
          COMMAND_ID: ${{ steps.ssm.outputs.command_id }}
          MAX_ATTEMPTS: "120"
          POLL_INTERVAL: "5"
        run: |
          dump_invocation() {
            local label="$1"
            echo "::group::SSM invocation dump ($label)"
            aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "{Status:Status,ExitCode:ResponseCode,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
              --output json || true
            echo "::endgroup::"
          }

          for i in $(seq 1 "$MAX_ATTEMPTS"); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            case "$STATUS" in
              Success) echo "SSM command succeeded"; exit 0 ;;
              Failed|Cancelled|TimedOut|DeliveryTimedOut|ExecutionTimedOut)
                echo "::error::SSM command status=$STATUS"
                dump_invocation "$STATUS"
                exit 1 ;;
              *) echo "Waiting... status=$STATUS ($i/$MAX_ATTEMPTS)" ;;
            esac
            sleep "$POLL_INTERVAL"
          done
          echo "::error::Timed out after $((MAX_ATTEMPTS * POLL_INTERVAL))s"
          dump_invocation "timeout"
          exit 1

      - name: Smoke test
        if: steps.guard.outputs.open == 'true'
        env:
          PR_NUM: ${{ github.event.number }}
          DOMAIN: ${{ secrets.DOMAIN }}
        run: |
          HOST="pr-${PR_NUM}.dev.${DOMAIN}"
          PREVIEW_URL="https://${HOST}/health/ready"
          echo "Resolving $HOST"
          getent hosts "$HOST" || echo "::warning::getent failed for $HOST"
          echo "Target URL: $PREVIEW_URL"
          for attempt in $(seq 1 12); do
            set +e
            HTTP_CODE=$(curl -sS --ipv4 -o /dev/null -w '%{http_code}' \
              --max-time 10 "$PREVIEW_URL" 2>/tmp/curl.err)
            RC=$?
            set -e
            if [[ "$HTTP_CODE" == "200" ]]; then
              echo "Smoke test passed — $PREVIEW_URL"; exit 0
            fi
            echo "Not ready — HTTP=$HTTP_CODE rc=$RC (attempt $attempt/12)"
            [[ "$attempt" -le 2 ]] && { echo "--- curl stderr ---"; cat /tmp/curl.err; echo "---"; }
            sleep 10
          done
          echo "Strict TLS smoke test failed after 12 attempts; trying health check with insecure TLS fallback"
          set +e
          HTTP_CODE=$(curl -k -sS --ipv4 -o /dev/null -w '%{http_code}' \
            --max-time 10 "$PREVIEW_URL" 2>/tmp/curl-insecure.err)
          RC=$?
          set -e
          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "::warning::Smoke test passed with insecure TLS fallback; preview certificate is not trusted yet."
            exit 0
          fi
          echo "--- insecure curl stderr ---"
          cat /tmp/curl-insecure.err
          echo "---"
          echo "Smoke test failed after strict and insecure attempts" >&2; exit 1

      - name: Comment on PR (success)
        if: success() && steps.guard.outputs.open == 'true'
        uses: actions/github-script@v9
        env:
          PR_NUM: ${{ github.event.number }}
          SHORT_SHA: ${{ steps.sha.outputs.short }}
          DOMAIN: ${{ secrets.DOMAIN }}
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Preview deployed\n\n**URL:** https://pr-${process.env.PR_NUM}.dev.${process.env.DOMAIN}\n**Image:** \`sha-${process.env.SHORT_SHA}\`\n\n_Automatically torn down when this PR closes._`
            })

      - name: Comment on PR (failure)
        if: failure()
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### Preview deploy failed\n\nCheck [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`
            })

  report:
    name: upload reports to S3
    needs: [test, build]
    if: always() && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Download coverage artifact
        if: needs.test.result == 'success'
        uses: actions/download-artifact@v7
        with:
          name: coverage
          path: reports/coverage/

      - name: Download Trivy artifact
        if: needs.build.result != 'skipped'
        uses: actions/download-artifact@v7
        with:
          name: trivy-sarif
          path: reports/trivy/

      - name: Upload reports to S3
        run: |
          aws s3 cp reports/ "s3://${{ secrets.REPORTS_BUCKET }}/${{ github.run_id }}/" \
            --recursive --no-progress
