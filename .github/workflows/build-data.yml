name: build data image

on:
  push:
    branches: [main]
    paths:
      - "apps/data/**"
      - "apps/ml/**"
      - ".github/workflows/build-data.yml"
  workflow_dispatch:

concurrency:
  group: build-data-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-data:
    name: build & push data image
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}
      ECR_REPOSITORY: petrocast/data
    steps:
      - uses: actions/checkout@v6

      - name: Compute short SHA
        id: sha
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: echo "short=${SOURCE_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: ${{ secrets.CI_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push data image
        uses: docker/build-push-action@v7
        with:
          context: apps
          file: apps/data/Dockerfile
          push: true
          pull: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:sha-${{ steps.sha.outputs.short }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:staging-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
