name: tf-plan

on:
  pull_request:
    branches: [main]
    paths:
      - "infra/terraform/**"

jobs:
  plan:
    name: terraform plan (${{ matrix.env }})
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    strategy:
      fail-fast: false
      matrix:
        env: [shared, preview, staging, prod]
    defaults:
      run:
        working-directory: infra/terraform/envs/${{ matrix.env }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.9"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Terraform init
        run: |
          terraform init \
            -backend-config="bucket=${{ secrets.TF_STATE_BUCKET }}" \
            -backend-config="dynamodb_table=${{ secrets.TF_LOCK_TABLE }}" \
            -backend-config="region=${{ secrets.AWS_REGION }}" \
            -backend-config="key=petrocast/${{ matrix.env }}/terraform.tfstate"

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        id: plan
        run: |
          terraform plan -no-color -out=tfplan 2>&1 | tee plan-output.txt
          echo "exitcode=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Comment plan on PR
        uses: actions/github-script@v7
        env:
          PLAN_OUTPUT_FILE: infra/terraform/envs/${{ matrix.env }}/plan-output.txt
          ENV: ${{ matrix.env }}
          PLAN_EXIT: ${{ steps.plan.outputs.exitcode }}
        with:
          script: |
            const fs = require('fs');
            const output = fs.readFileSync(process.env.PLAN_OUTPUT_FILE, 'utf8');
            const truncated = output.length > 60000
              ? output.slice(0, 60000) + '\n...[truncated]'
              : output;
            const status = process.env.PLAN_EXIT === '0' ? '✅' : '❌';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### ${status} Terraform plan — \`${process.env.ENV}\`\n\n<details><summary>Show plan</summary>\n\n\`\`\`hcl\n${truncated}\n\`\`\`\n\n</details>`
            })

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: exit 1
