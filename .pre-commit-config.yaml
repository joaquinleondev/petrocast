repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: mixed-line-ending

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^apps/(api|data)/
      - id: ruff-format
        files: ^apps/(api|data)/

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.13.0
    hooks:
      - id: mypy
        name: mypy (apps/api)
        files: ^apps/api/src/
        args: [--config-file=apps/api/pyproject.toml]
        additional_dependencies:
          - pydantic>=2.0
          - pydantic-settings>=2.0
          - fastapi>=0.136.0
      - id: mypy
        name: mypy (apps/data)
        files: ^apps/data/src/
        args: [--config-file=apps/data/pyproject.toml]
        additional_dependencies:
          - dagster>=1.12.0
          - dagster-dbt>=0.28.0
          - dagster-dlt>=0.28.0
          - psycopg>=3.2.0
          - pydantic-settings>=2.0

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.14.0
    hooks:
      - id: markdownlint-cli2
        args: ["--config", ".markdownlint.yaml"]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      - id: yamllint
        args: ["-c", ".yamllint.yaml"]

  - repo: https://github.com/sqlfluff/sqlfluff
    rev: 4.2.2
    hooks:
      - id: sqlfluff-lint
        files: ^apps/data/dbt/(models|tests)/.*\.sql$
